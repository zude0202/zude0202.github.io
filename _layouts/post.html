<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; font-size: 16px; line-height: 1.9; color: #222; background: #fff; }
      a { color: #1a73e8; text-decoration: none; }
      .site-header { border-bottom: 2px solid #222; padding: 16px 20px; }
      .site-header a { font-size: 18px; font-weight: 700; color: #222; text-decoration: none; }
      .page-content { max-width: 720px; margin: 0 auto; padding: 24px 20px 60px; }
      .post-header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 2px solid #222; }
      .post-header h1 { font-size: 22px; font-weight: 700; line-height: 1.5; color: #222; margin-bottom: 12px; }
      .post-meta { font-size: 13px; color: #999; }
      .post-body { font-size: 16px; line-height: 1.9; color: #333; }
      .post-body h2 { font-size: 20px; font-weight: 700; margin: 40px 0 16px; padding-left: 12px; border-left: 4px solid #222; }
      .post-body h3 { font-size: 17px; font-weight: 700; margin: 28px 0 12px; padding-bottom: 4px; border-bottom: 1px solid #ddd; }
      .post-body p { margin-bottom: 20px; }
      .post-body ul, .post-body ol { margin: 0 0 20px 24px; }
      .post-body li { margin-bottom: 8px; }
      .post-body strong { font-weight: 700; background: linear-gradient(transparent 60%, #fff3b0 60%); }
      .post-body blockquote { margin: 24px 0; padding: 16px 20px; background: #f8f8f8; border-left: 4px solid #ccc; color: #555; }
      .post-body a { color: #1a73e8; text-decoration: underline; }
      .back-link { display: inline-block; margin-top: 40px; font-size: 14px; color: #666; }
      .site-footer { border-top: 1px solid #ddd; padding: 20px; text-align: center; font-size: 13px; color: #999; margin-top: 40px; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    </header>
    <div class="page-content">
      <div class="post-header">
        <h1>{{ page.title }}</h1>
        <div class="post-meta">{{ page.date | date: "%Y年%-m月%-d日" }}</div>
      </div>
      <div class="post-body">
        {{ content }}
      </div>
      <a class="back-link" href="{{ '/' | relative_url }}">← 記事一覧に戻る</a>
    </div>
    <footer class="site-footer">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
    </footer>
  </body>
</html>
